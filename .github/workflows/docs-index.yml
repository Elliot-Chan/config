name: docs-index

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-docs-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build docs index
        run: python3 scripts/build-docs-index.py --source docs/cangjie-doc-index.example.json --output dist/docs-index.json

      - name: Upload docs index artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-index
          path: dist/docs-index.json
          if-no-files-found: error
