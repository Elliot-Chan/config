# Core
shell zsh -l
term xterm-kitty
editor nvim
shell_integration enabled
linux_display_server x11

# Fonts
font_family Maple Mono Normal NL CN
bold_font auto
italic_font auto
bold_italic_font auto
font_size 14.0
symbol_map U+E000-U+F8FF FiraCode Nerd Font
symbol_map U+F0000-U+FFFFD JetBrainsMono Nerd Font
symbol_map U+1F300-U+1FAFF Noto Color Emoji
disable_ligatures never

# Appearance
include themes/catppuccin-mocha.conf
background_opacity 1.0
window_padding_width 0 0 10 8
hide_window_decorations yes
confirm_os_window_close 0
enable_audio_bell no
visual_bell_duration 0.15
cursor_shape block
cursor_blink_interval 0.65
repaint_delay 8
input_delay 1
sync_to_monitor yes

# Tabs and layout
enabled_layouts splits,tall,fat,grid,stack
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 2
tab_title_template "{index}: {title}"
active_tab_title_template "{index}: {title}"
active_tab_font_style bold
inactive_tab_font_style normal

# Scrolling and selection
scrollback_lines 20000
wheel_scroll_multiplier 5.0
url_style curly
open_url_with default
copy_on_select no
strip_trailing_spaces smart

# Remote control is needed for project/session helpers.
# Keep it socket-only so programs inside a terminal cannot control kitty via TTY.
allow_remote_control socket-only
listen_on unix:/tmp/kitty-elliot

# Basic
map f1 show_scrollback
map f2 command_palette
map f3 kitten themes
map f11 toggle_fullscreen
map alt+f search_scrollback
map ctrl+alt+u kitten hints --type url
map ctrl+alt+shift+u kitten hints --type url --program @
map ctrl+alt+shift+p kitten hints --type path --program -
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+left send_text normal,application \x1bOH
map ctrl+right send_text normal,application \x1bOF
map alt+left send_text normal,application \x1bOH
map alt+right send_text normal,application \x1bOF
map alt+backspace send_text normal,application \x15

# Tabs
map alt+t new_tab_with_cwd
map ctrl+alt+t new_tab zsh -l
map ctrl+alt+w close_tab
map ctrl+alt+1 goto_tab 1
map ctrl+alt+2 goto_tab 2
map ctrl+alt+3 goto_tab 3
map ctrl+alt+4 goto_tab 4
map ctrl+alt+5 goto_tab 5
map ctrl+alt+6 goto_tab 6
map ctrl+alt+7 goto_tab 7
map ctrl+alt+8 goto_tab 8
map ctrl+alt+9 goto_tab 9
map ctrl+alt+0 goto_tab 10
map alt+[ previous_tab
map alt+] next_tab
map alt+, previous_tab
map alt+. next_tab
map ctrl+alt+[ move_tab_backward
map ctrl+alt+] move_tab_forward
map ctrl+alt+, move_tab_backward
map ctrl+alt+. move_tab_forward
map alt+0 set_tab_title
map ctrl+alt+r set_tab_title
map alt+9 toggle_tab_bar

# Windows and projects
map alt+n new_os_window
map alt+shift+n launch --type=os-window --cwd=current zsh -l
map alt+o launch --type=overlay /home/elliot/config/kitty/scripts/open_project.sh
map alt+y launch --type=background --cwd=current sh -lc "printf %s \"$PWD\" | wl-copy"
map alt+- resize_os_window -50 -50
map alt+= resize_os_window 50 50

# Splits
map alt+backslash launch --location=vsplit --cwd=current zsh -l
map alt+/ launch --location=hsplit --cwd=current zsh -l
map alt+enter toggle_layout stack
map alt+w close_window
map ctrl+alt+k neighboring_window up
map ctrl+alt+j neighboring_window down
map ctrl+alt+h neighboring_window left
map ctrl+alt+l neighboring_window right
map ctrl+alt+p focus_visible_window
map alt+u scroll_line_up
map alt+d scroll_line_down
map page_up scroll_page_up
map page_down scroll_page_down

# Resize panes
map ctrl+alt+shift+k resize_window taller 1
map ctrl+alt+shift+j resize_window shorter 1
map ctrl+alt+shift+h resize_window narrower 1
map ctrl+alt+shift+l resize_window wider 1
map ctrl+alt+shift+equal change_font_size all +1.0
map ctrl+alt+shift+minus change_font_size all -1.0
map ctrl+alt+shift+0 change_font_size all 0

# Sessions
map ctrl+alt+s launch --type=background kitty @ --to unix:/tmp/kitty-elliot load-config
map ctrl+alt+c launch --type=background /home/elliot/config/kitty/scripts/open_cangjie_workspace.sh
map ctrl+alt+x launch --type=background kitty @ --to unix:/tmp/kitty-elliot launch --type=tab --cwd=/home/elliot/Code/working/cangjie_stdx --tab-title stdx zsh -l


# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME
